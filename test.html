<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>🛰️ Test Sintonía Lattice</title>
    <style>
        body { font-family: monospace; background: #0a0a0a; color: #00ff41; padding: 20px; line-height: 1.4; }
        #console { background: #000; border: 1px solid #00ff41; padding: 15px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,255,65,0.2); }
        .error { color: #ff3e3e; }
        .success { color: #00ff41; }
        .info { color: #3eb4ff; }
        pre { white-space: pre-wrap; word-wrap: break-word; font-size: 0.85em; opacity: 0.8; }
        .loading::after { content: '...'; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>
    <h1>LATTICE_TEST_v2.0</h1>
    <div id="console">
        <div id="status" class="loading">Iniciando protocolo de sintonía segura</div>
        <hr style="border: 0.5px solid #00ff41; margin: 15px 0;">
        <div id="output"></div>
    </div>

    <script>
        const status = document.getElementById('status');
        const output = document.getElementById('output');

        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = type;
            div.innerHTML = `> [${new Date().toLocaleTimeString()}] ${msg}`;
            output.appendChild(div);
        }

        async function loadTest() {
    try {
        const response = await fetch('/api/get-lattice');
        const records = await response.json();
        
        const output = document.getElementById('output');
        output.innerHTML = ''; // Limpiamos el "Cargando..."

        records.forEach(record => {
            const f = record.fields;
            const entry = document.createElement('div');
            
            // Estilo básico para diferenciar los canales
            entry.style.borderLeft = "5px solid #00ff41";
            entry.style.margin = "15px 0";
            entry.style.padding = "10px";
            entry.style.background = "#1a1a1a";

            // Buscamos la foto en tu columna 'archivo'
            const foto = f.archivo?.[0]?.thumbnails?.large?.url || '';

            entry.innerHTML = `
                <small style="color: #888;"># CANAL: ${f.canal || 'SIN CANAL'}</small>
                <p style="font-size: 1.2em; margin: 5px 0;">${f.mensaje || '<em>Sin mensaje</em>'}</p>
                ${foto ? `<img src="${foto}" style="max-width: 100%; border: 1px solid #333;">` : ''}
                <br>
                <small style="color: #444;">ID: ${f.id} | ${f['fecha y hora'] || ''}</small>
            `;
            output.appendChild(entry);
        });

    } catch (e) {
        console.error("Fallo de sintonía:", e);
        document.getElementById('output').innerHTML = "❌ Error al conectar con la API.";
    }
}
loadTest();
    </script>
</body>
</html>

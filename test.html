<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>🛰️ Test Sintonía Lattice v2.1</title>
    <style>
        body { font-family: monospace; background: #0a0a0a; color: #00ff41; padding: 20px; line-height: 1.4; }
        #console { background: #000; border: 1px solid #00ff41; padding: 15px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,255,65,0.2); }
        .error { color: #ff3e3e; }
        .success { color: #00ff41; }
        .info { color: #3eb4ff; }
        pre { white-space: pre-wrap; word-wrap: break-word; font-size: 0.85em; opacity: 0.8; background: #111; padding: 10px; }
        .test-img { max-width: 200px; border: 1px solid #00ff41; margin-top: 10px; display: block; }
        .loading::after { content: '...'; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>
    <h1>LATTICE_TEST_v2.1</h1>
    <div id="console">
        <div id="status" class="loading">Iniciando protocolo de sintonía segura</div>
        <hr style="border: 0.5px solid #00ff41; margin: 15px 0;">
        <div id="output"></div>
    </div>

    <script>
        const status = document.getElementById('status');
        const output = document.getElementById('output');

        function log(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = type;
            div.innerHTML = `> [${new Date().toLocaleTimeString()}] ${msg}`;
            output.appendChild(div);
        }

        async function sintonizar() {
            log("Llamando al puente de Vercel: /api/get-lattice", "info");

            try {
                const response = await fetch('/api/get-lattice');
                
                if (!response.ok) {
                    throw new Error(`Error en el servidor Vercel: ${response.status}`);
                }

                const data = await response.json();
                const records = data.records || data;
                
                if (!Array.isArray(records) || records.length === 0) {
                    throw new Error("Conexión exitosa pero Airtable no devolvió registros.");
                }

                status.innerHTML = "✅ SINTONÍA ESTABLECIDA";
                status.className = "success";
                log(`Se han detectado ${records.length} registros.`, "success");

                // --- VERIFICACIÓN DE INTEGRIDAD ---
                const first = records[0].fields;
                log("Analizando metadatos del primer registro...", "info");
                
                // Buscamos la foto real
                const fotoUrl = first.archivo && first.archivo[0] ? first.archivo[0].thumbnails.large.url : null;
                
                // CORRECCIÓN: Usamos el nombre exacto de tu columna en Airtable
                const fechaReal = first['fecha y hora'] || "CAMPO 'fecha y hora' NO ENCONTRADO";

                const resumen = {
                    mensaje: first.mensaje || "VACÍO",
                    canal: first.canal || "VACÍO",
                    fecha_detectada: fechaReal,
                    foto_url: fotoUrl ? "URL_GENERADA" : "NO_HAY_FOTO"
                };

                const pre = document.createElement('pre');
                pre.innerHTML = JSON.stringify(resumen, null, 2);
                output.appendChild(pre);

                // --- TEST VISUAL DE IMAGEN ---
                if (fotoUrl) {
                    log("Intentando renderizar miniatura de Airtable...", "success");
                    const img = document.createElement('img');
                    img.src = fotoUrl;
                    img.className = 'test-img';
                    output.appendChild(img);
                } else {
                    log("El primer registro no contiene archivos adjuntos para testear.", "info");
                }

            } catch (error) {
                status.innerHTML = "❌ FALLO DE SINTONÍA";
                status.className = "error";
                log(error.message, "error");
            }
        }

        sintonizar();
    </script>
</body>
</html>

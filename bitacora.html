<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⋆.˚ ☼⋆𓇼｡𖦹˙༄.° </title>
    <style>
        :root { 
            --bg-color: #fafafa; 
            --text-color: #1a4a75; 
            --entry-bg: #ffffff;
            --accent: #5dade2;
        }

        body.dark-mode { 
            --bg-color: #0b0f19; 
            --text-color: #94e2d5; 
            --entry-bg: #161b22;
        }

        body { 
            background-color: var(--bg-color); 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0;
            color: var(--text-color);
            transition: background-color 1.2s ease, color 1.2s ease;
            overflow-x: hidden;
        } 
        
        #theme-toggle {
            position: fixed; top: 25px; left: 35px; z-index: 2000;
            background: transparent; border: 1px solid var(--text-color);
            color: var(--text-color); padding: 5px 15px; border-radius: 50px;
            cursor: pointer; font-size: 0.9rem; transition: all 0.4s ease;
            opacity: 0.6;
        }

        .menu-container {
            position: fixed; top: 25px; right: 35px; z-index: 2000;
            text-align: right;
        }
        .menu-arrow { font-size: 1.5rem; cursor: pointer; opacity: 0.4; transform: rotate(90deg); }
        .menu-content {
            display: none; background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(12px); border-radius: 12px; padding: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1); border: 1px solid rgba(0,0,0,0.05);
        }
        .menu-container:hover .menu-content { display: block; }
        .menu-content button {
            display: block; width: 100%; background: none; border: none;
            padding: 10px 20px; text-align: right; cursor: pointer;
            font-size: 0.8rem; letter-spacing: 2px; color: inherit;
        }

        header { padding: 12vh 0 6vh; text-align: center; }
        h1 { font-weight: 700; letter-spacing: 6px; text-transform: uppercase; font-size: 0.85rem; opacity: 0.6; }

        /* EL FEED: Ahora con un estilo más orgánico */
        #feed { 
            column-count: 4; column-gap: 30px;
            padding: 40px; max-width: 95vw; margin: 0 auto;
        }

        @media (max-width: 1200px) { #feed { column-count: 3; } }
        @media (max-width: 850px) { #feed { column-count: 2; } }
        @media (max-width: 550px) { #feed { column-count: 1; } }

        /* ARREGLO DE LA CLASE .ENTRY */
        .entry { 
            break-inside: avoid; margin-bottom: 40px;
            background: var(--entry-bg); padding: 25px; 
            border: 1px solid rgba(0,0,0,0.08);
            box-shadow: 2px 2px 15px rgba(0,0,0,0.05);
            transition: all 0.4s ease;
            display: flex; flex-direction: column;
            position: relative;
            /* Efecto sutil de rotación para el look collage */
            transform: rotate(calc(var(--rotation, 0deg)));
        }

        /* Rotaciones aleatorias automáticas (opcional pero le da el toque) */
        .entry:nth-child(even) { --rotation: -1.2deg; }
        .entry:nth-child(odd) { --rotation: 1.1deg; }

        .entry:hover { 
            transform: translateY(-10px) rotate(0deg) scale(1.02); 
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
            z-index: 10;
        }

        .content { font-family: 'Courier New', monospace; font-size: 0.95rem; line-height: 1.6; }
        .date { font-size: 0.6rem; opacity: 0.4; text-align: right; margin-top: 15px; letter-spacing: 1px; }
        
        /* IMÁGENES DENTRO DE LA TARJETA */
        .entry img { 
            width: calc(100% + 50px); 
            margin-left: -25px; 
            margin-top: 15px; 
            filter: saturate(0.85);
            transition: filter 0.3s ease;
        }
        .entry:hover img { filter: saturate(1.1); }

    </style>
</head>
<body>

    <button id="theme-toggle" onclick="toggleDarkMode()">⋅˚.⋆☾⁺₊ ‧</button>

    <div class="menu-container">
        <div class="menu-arrow">➤</div>
        <div class="menu-content">
            <button onclick="filter('all')">VER TODO</button>
            <button onclick="filter('referencias')">REFERENCIAS</button>
            <button onclick="filter('pruebas-material')">PRUEBAS MATERIAL</button>
            <button onclick="filter('bitacora-diaria')">BITÁCORA DIARIA</button>
            <button onclick="filter('la-vida')">LA VIDA</button>
        </div>
    </div>

    <header><h1>✧･ﾟ: * [ L A T T I C E _ O S 1 ] *:･ﾟ✧</h1></header>

    <main id="feed">
        <p style="text-align: center; opacity: 0.5;">Sintonizando la Lattice...</p>
    </main>

<script>
    let audioCtx;
    let isMusicPlaying = false;
    const notes = [216, 256.8, 324, 384, 432]; 

    function playPop() {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.05);
        g.gain.setValueAtTime(0.01, audioCtx.currentTime);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function toggleDarkMode() {
        playPop();
        document.body.classList.toggle('dark-mode');
    }

    function filter(cat) {
        playPop();
        const entries = document.querySelectorAll('.entry');
        entries.forEach(entry => {
            const category = entry.getAttribute('data-category') || '';
            // Ajuste para que coincida con tus nombres de Discord
            if (cat === 'all' || category.includes(cat)) {
                entry.style.display = 'flex';
            } else {
                entry.style.display = 'none';
            }
        });
    }

    async function loadBitacora() {
        const feed = document.getElementById('feed');
        try {
            const response = await fetch('/api/get-lattice');
            const records = await response.json();
            if (feed) feed.innerHTML = ''; 

            records.forEach((record) => {
                const f = record.fields;
                const msg = f.mensaje || '';
                const canal = (f.canal || 'S/N').toLowerCase();
                const rawFecha = f["fecha y hora"];
                
                let foto = '';
                if (f.archivo && f.archivo[0]) {
                    foto = f.archivo[0].thumbnails?.large?.url || f.archivo[0].url;
                }

                if (!msg && !foto) return;

                const entry = document.createElement('article');
                entry.className = 'entry';
                entry.setAttribute('data-category', canal);
                
                const imgHtml = foto ? `<img src="${foto}" loading="lazy" onerror="this.style.display='none'">` : '';
                
                let fechaDisplay = '---';
                if (rawFecha) {
                    const d = new Date(rawFecha);
                    fechaDisplay = isNaN(d) ? '---' : d.toLocaleDateString('es-CL').toUpperCase();
                }

                entry.innerHTML = `
                    <div class="content">${msg.replace(/\n/g, '<br>')}</div>
                    ${imgHtml}
                    <span class="date">${fechaDisplay} | CH_${canal.toUpperCase()}</span>
                `;
                feed.appendChild(entry);
            });
        } catch (e) {
            console.error(e);
            feed.innerHTML = 'Error en la sintonía.';
        }
    }
    window.onload = loadBitacora;
</script>
</body>
</html>
